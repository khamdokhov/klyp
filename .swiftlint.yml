disabled_rules:
  - trailing_comma
  - todo

opt_in_rules:
  - empty_count
  - explicit_init
  - fatal_error_message
  - first_where
  - force_unwrapping
  - implicitly_unwrapped_optional
  - overridden_super_call
  - private_outlet
  - redundant_nil_coalescing
  - sorted_first_last

line_length:
  warning: 120
  error: 160

function_body_length:
  warning: 300
  error: 300

function_parameter_count:
  warning: 10
  error: 12

type_body_length:
  warning: 350
  error: 450

cyclomatic_complexity:
  warning: 20
  error: 25

file_length:
  warning: 500
  error: 800

identifier_name:
  min_length:
    warning: 2
  excluded:
    - id
    - i
    - x
    - y
    - t

excluded:
  - DerivedData
  - build
  - .build

reporter: xcode
