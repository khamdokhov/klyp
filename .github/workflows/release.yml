name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Build and package DMG
        run: ./scripts/make-dmg.sh

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Klyp-*.dmg
          generate_release_notes: true
