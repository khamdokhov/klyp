name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Build and package DMG
        env:
          CLEAN: "1"
        run: |
          xcodebuild -version
          ./scripts/make-dmg.sh

      - name: Resolve DMG path
        run: echo "DMG_PATH=$(ls dist/Klyp-*.dmg)" >> "$GITHUB_ENV"

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.DMG_PATH }}
          generate_release_notes: true
